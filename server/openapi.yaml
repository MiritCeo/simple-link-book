    post:
      summary: Publiczna rezerwacja
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                time:
                  type: string
                notes:
                  type: string
                serviceId:
                  type: string
                serviceIds:
                  type: array
                  items:
                    type: string
                staffId:
                  type: string
                client:
                  type: object
                  properties:
                    name:
                      type: string
                    phone:
                      type: string
                    email:
                      type: string
                    notes:
                      type: string
                  required:
                    - name
                    - phone
              required:
                - date
                - time
                - client
      responses:
        "200":
          description: OK
        "400":
          description: Validation or data error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBookingError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
                    message: Nieprawidłowe dane rezerwacji
                service_missing:
                  value:
                    error: service_missing
                    message: Wybierz przynajmniej jedną usługę
                service_not_found:
                  value:
                    error: service_not_found
                    message: Nie znaleziono usług w tym salonie
                staff_not_found:
                  value:
                    error: staff_not_found
                    message: Nie znaleziono pracownika w tym salonie
                staff_service_mismatch:
                  value:
                    error: staff_service_mismatch
                    message: Pracownik nie wykonuje wybranych usług
        "404":
          description: Salon not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBookingError"
              examples:
                salon_not_found:
                  value:
                    error: salon_not_found
                    message: Nie znaleziono salonu o podanym linku
        "409":
          description: Availability conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBookingError"
              examples:
                salon_closed:
                  value:
                    error: salon_closed
                    message: Salon jest zamknięty w tym dniu
                time_unavailable:
                  value:
                    error: time_unavailable
                    message: Termin jest niedostępny
                break_time:
                  value:
                    error: break_time
                    message: Termin wypada w czasie przerwy
                staff_unavailable:
                  value:
                    error: staff_unavailable
                    message: Pracownik jest niedostępny w tym terminie
                staff_busy:
                  value:
                    error: staff_busy
                    message: Pracownik jest zajęty w tym terminie
