openapi: 3.0.3
info:
  title: honly API
  version: 0.1.0
  description: API dla panelu salonu, klienta i publicznej rezerwacji.
servers:
  - url: https://honly.pl
    description: Production
  - url: http://localhost:4000
    description: Local

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]
    AuthError:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_payload
            - invalid_credentials
            - account_inactive
            - client_profile_missing
            - token_invalid
            - salon_not_linked
            - unauthorized
            - forbidden
            - email_taken
            - internal_error
            - profile_not_found
            - account_not_found
            - invalid_current_password
      required: [error]
    AuthResponse:
      type: object
      properties:
        token: { type: string }
        salonId: { type: string, nullable: true }
        userId: { type: string }
        role: { type: string }
        salons:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              slug: { type: string }
              role: { type: string }
    ClientAuthResponse:
      type: object
      properties:
        token: { type: string }
        clientId: { type: string }
        salonId: { type: string }
        salons:
          type: array
          items:
            $ref: '#/components/schemas/ClientSalon'
    ClientSalon:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        clientId: { type: string }
        address: { type: string }
        phone: { type: string }
        hours: { type: string }
        description: { type: string }
    PublicBookingError:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_payload
            - salon_not_found
            - service_missing
            - service_not_found
            - staff_not_found
            - staff_service_mismatch
            - salon_closed
            - time_unavailable
            - break_time
            - staff_unavailable
            - staff_busy
        message:
          type: string
      required: [error]
    Appointment:
      type: object
      properties:
        id: { type: string }
        date: { type: string }
        time: { type: string }
        duration: { type: integer }
        status: { type: string }
        notes: { type: string, nullable: true }
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

paths:
  /api/health:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: OK

  /api/auth/login:
    post:
      summary: Login (panel salonu)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_credentials:
                  value: { error: invalid_credentials }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                account_inactive:
                  value: { error: account_inactive }

  /api/auth/register:
    post:
      summary: Rejestracja salonu (OWNER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                phone: { type: string }
                password: { type: string }
                salonName: { type: string }
                salonSlug: { type: string }
              required: [email, phone, password, salonName, salonSlug]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '409':
          description: Email taken
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                email_taken:
                  value: { error: email_taken }

  /api/auth/switch-salon:
    post:
      summary: Zmiana aktywnego salonu
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                salonId: { type: string }
              required: [salonId]
      responses:
        '200':
          description: OK
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                unauthorized:
                  value: { error: unauthorized }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                forbidden:
                  value: { error: forbidden }

  /api/client/login:
    post:
      summary: Login klienta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
              required: [email, password]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientAuthResponse' }
              examples:
                success:
                  value:
                    token: eyJhbGciOi...
                    clientId: c_123
                    salonId: s_123
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        address: "ul. Kwiatowa 1, Warszawa"
                        phone: "+48 123 456 789"
                        hours: "Pn-Pt 9:00-18:00"
                        description: "Salon fryzjerski"
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: "ul. Lipowa 5, Warszawa"
                        phone: "+48 222 333 444"
                        hours: "Pn-Sb 10:00-20:00"
                        description: "Salon kosmetyczny"
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_credentials:
                  value: { error: invalid_credentials }
        '403':
          description: Forbidden
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                account_inactive:
                  value: { error: account_inactive }
        '500':
          description: Internal error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                internal_error:
                  value: { error: internal_error }

  /api/client/salons:
    get:
      summary: Lista salonów klienta
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  salons:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientSalon'
                  activeSalonId:
                    type: string
              examples:
                success:
                  value:
                    activeSalonId: s_123
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        address: "ul. Kwiatowa 1, Warszawa"
                        phone: "+48 123 456 789"
                        hours: "Pn-Pt 9:00-18:00"
                        description: "Salon fryzjerski"
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: "ul. Lipowa 5, Warszawa"
                        phone: "+48 222 333 444"
                        hours: "Pn-Sb 10:00-20:00"
                        description: "Salon kosmetyczny"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                unauthorized:
                  value: { error: unauthorized }
        '404':
          description: Account not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                account_not_found:
                  value: { error: account_not_found }

  /api/client/switch-salon:
    post:
      summary: Zmiana aktywnego salonu klienta
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                salonId: { type: string }
              required: [salonId]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  clientId: { type: string }
                  salonId: { type: string }
              examples:
                success:
                  value:
                    token: eyJhbGciOi...
                    clientId: c_456
                    salonId: s_456
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                unauthorized:
                  value: { error: unauthorized }
        '404':
          description: Salon not linked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                salon_not_linked:
                  value: { error: salon_not_linked }

  /api/client/salons/attach:
    post:
      summary: Dodanie salonu klienta po tokenie
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
              required: [token]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  salons:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientSalon'
              examples:
                success:
                  value:
                    ok: true
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        address: "ul. Kwiatowa 1, Warszawa"
                        phone: "+48 123 456 789"
                        hours: "Pn-Pt 9:00-18:00"
                        description: "Salon fryzjerski"
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: "ul. Lipowa 5, Warszawa"
                        phone: "+48 222 333 444"
                        hours: "Pn-Sb 10:00-20:00"
                        description: "Salon kosmetyczny"
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                unauthorized:
                  value: { error: unauthorized }
        '404':
          description: Token invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                token_invalid:
                  value: { error: token_invalid }

  /api/client/password-reset:
    post:
      summary: Reset hasła klienta (request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
              required: [email]
      responses:
        '200':
          description: OK
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }

  /api/client/password-reset/confirm:
    post:
      summary: Reset hasła klienta (confirm)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                newPassword: { type: string }
              required: [token, newPassword]
      responses:
        '200':
          description: OK
        '400':
          description: Invalid payload / token invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
                token_invalid:
                  value: { error: token_invalid }

  /api/client/me:
    get:
      summary: Profil klienta
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: OK
    put:
      summary: Aktualizacja profilu klienta
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                email: { type: string }
              required: [name, phone]
      responses:
        '200':
          description: OK

  /api/client/password:
    put:
      summary: Zmiana hasła klienta
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword: { type: string }
                newPassword: { type: string }
              required: [currentPassword, newPassword]
      responses:
        '200':
          description: OK

  /api/client/appointments:
    get:
      summary: Wizyty klienta (z cancelToken)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: OK

  /api/public/salons/{slug}:
    get:
      summary: Dane publiczne salonu
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/public/salons/{slug}/availability:
    get:
      summary: Dostępne sloty
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string }
        - in: query
          name: serviceId
          required: true
          schema: { type: string }
        - in: query
          name: staffId
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/public/salons/{slug}/appointments:
    post:
      summary: Publiczna rezerwacja
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date: { type: string }
                time: { type: string }
                notes: { type: string }
                serviceId: { type: string }
                serviceIds:
                  type: array
                  items: { type: string }
                staffId: { type: string }
                client:
                  type: object
                  properties:
                    name: { type: string }
                    phone: { type: string }
                    email: { type: string }
                    notes: { type: string }
                  required: [name, phone]
              required: [date, time, client]
      responses:
        '200':
          description: OK
        '400':
          description: Validation or data error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicBookingError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload, message: "Nieprawidłowe dane rezerwacji" }
                service_missing:
                  value: { error: service_missing, message: "Wybierz przynajmniej jedną usługę" }
                service_not_found:
                  value: { error: service_not_found, message: "Nie znaleziono usług w tym salonie" }
                staff_not_found:
                  value: { error: staff_not_found, message: "Nie znaleziono pracownika w tym salonie" }
                staff_service_mismatch:
                  value: { error: staff_service_mismatch, message: "Pracownik nie wykonuje wybranych usług" }
        '404':
          description: Salon not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicBookingError' }
              examples:
                salon_not_found:
                  value: { error: salon_not_found, message: "Nie znaleziono salonu o podanym linku" }
        '409':
          description: Availability conflict
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicBookingError' }
              examples:
                salon_closed:
                  value: { error: salon_closed, message: "Salon jest zamknięty w tym dniu" }
                time_unavailable:
                  value: { error: time_unavailable, message: "Termin jest niedostępny" }
                break_time:
                  value: { error: break_time, message: "Termin wypada w czasie przerwy" }
                staff_unavailable:
                  value: { error: staff_unavailable, message: "Pracownik jest niedostępny w tym terminie" }
                staff_busy:
                  value: { error: staff_busy, message: "Pracownik jest zajęty w tym terminie" }

  /api/public/cancel/{token}:
    get:
      summary: Szczegóły rezerwacji po tokenie
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
    post:
      summary: Odwołanie rezerwacji
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/public/cancel/{token}/availability:
    get:
      summary: Dostępne sloty do przełożenia
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
        - in: query
          name: date
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK

  /api/public/cancel/{token}/reschedule:
    post:
      summary: Przełożenie rezerwacji
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date: { type: string }
                time: { type: string }
              required: [date, time]
      responses:
        '200':
          description: OK

  /api/public/client/register:
    post:
      summary: Rejestracja klienta po rezerwacji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
                email: { type: string }
                password: { type: string }
              required: [token, password]
      responses:
        '200':
          description: OK
        '400':
          description: Invalid payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                invalid_payload:
                  value: { error: invalid_payload }
        '404':
          description: Token invalid
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                token_invalid:
                  value: { error: token_invalid }
        '409':
          description: Email taken or account exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthError' }
              examples:
                email_taken:
                  value: { error: email_taken }

  /api/salon/profile:
    get:
      summary: Profil salonu
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
    put:
      summary: Aktualizacja profilu salonu
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: OK }

  /api/salon/services:
    get:
      summary: Lista usług
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Dodanie usługi
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /api/salon/services/{id}:
    put:
      summary: Aktualizacja usługi
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }
    delete:
      summary: Dezaktywacja usługi (soft delete)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  /api/salon/staff:
    get:
      summary: Lista pracowników
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Dodanie pracownika
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /api/salon/staff/{id}:
    put:
      summary: Aktualizacja pracownika
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
    delete:
      summary: Dezaktywacja pracownika
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }

  /api/salon/staff/{id}/account:
    post:
      summary: Tworzenie konta pracownika
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }
    put:
      summary: Aktualizacja konta pracownika
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /api/salon/clients:
    get:
      summary: Lista klientów
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Dodanie klienta
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }

  /api/salon/clients/{id}:
    put:
      summary: Aktualizacja klienta
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: OK }
