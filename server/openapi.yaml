openapi: 3.0.3
info:
  title: honly API
  version: 0.1.0
  description: API dla panelu salonu, klienta i publicznej rezerwacji.
servers:
  - url: https://honly.pl
    description: Production
  - url: http://localhost:4000
    description: Local
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthError:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_payload
            - invalid_credentials
            - account_inactive
            - client_profile_missing
            - token_invalid
            - salon_not_linked
            - unauthorized
            - forbidden
            - email_taken
            - internal_error
            - profile_not_found
            - account_not_found
            - invalid_current_password
            - no_social_account_found
            - phone_taken
            - social_account_taken
            - invalid_phone
            - verification_code_not_found
            - verification_code_expired
            - invalid_verification_code
            - too_many_attempts
            - salon_not_selected
            - google_calendar_not_connected
            - google_oauth_not_configured
      required:
        - error
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        salonId:
          type: string
          nullable: true
        userId:
          type: string
        role:
          type: string
        salons:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              slug:
                type: string
              role:
                type: string
    AuthSalon:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        role:
          type: string
          enum:
            - SUPER_ADMIN
            - OWNER
            - STAFF
      required:
        - id
        - name
        - slug
        - role
    AuthMeResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            phone:
              type: string
              nullable: true
            role:
              type: string
              enum:
                - SUPER_ADMIN
                - OWNER
                - STAFF
            active:
              type: boolean
            salonId:
              type: string
              nullable: true
            createdAt:
              type: string
              format: date-time
          required:
            - id
            - email
            - role
            - active
            - createdAt
        activeSalonId:
          type: string
          nullable: true
        activeSalon:
          allOf:
            - $ref: "#/components/schemas/AuthSalon"
          nullable: true
        inventoryRole:
          type: string
          enum:
            - ADMIN
            - MANAGER
            - STAFF
      required:
        - user
        - activeSalonId
        - activeSalon
        - inventoryRole
    AuthSalonsResponse:
      type: object
      properties:
        activeSalonId:
          type: string
          nullable: true
        salons:
          type: array
          items:
            $ref: "#/components/schemas/AuthSalon"
      required:
        - activeSalonId
        - salons
    GoogleCalendarStatusResponse:
      type: object
      properties:
        configured:
          type: boolean
        redirectUri:
          type: string
          nullable: true
        scope:
          type: string
        connected:
          type: boolean
        connection:
          type: object
          nullable: true
          properties:
            googleAccountEmail:
              type: string
              nullable: true
            googleCalendarId:
              type: string
            googleCalendarName:
              type: string
              nullable: true
            syncEnabled:
              type: boolean
            syncHorizonDays:
              type: integer
            lastSyncAt:
              type: string
              format: date-time
              nullable: true
            lastSyncError:
              type: string
              nullable: true
            updatedAt:
              type: string
              format: date-time
      required:
        - configured
        - redirectUri
        - scope
        - connected
    SalonRegisterResponse:
      type: object
      properties:
        ok:
          type: boolean
        pendingApproval:
          type: boolean
        salonId:
          type: string
        userId:
          type: string
        role:
          type: string
          enum:
            - OWNER
        salons:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              slug:
                type: string
              role:
                type: string
                enum:
                  - OWNER
              active:
                type: boolean
      required:
        - ok
        - pendingApproval
        - salonId
        - userId
        - role
        - salons
    ActivationEmailStatus:
      type: object
      properties:
        attempted:
          type: boolean
        sent:
          type: boolean
        sandbox:
          type: boolean
          nullable: true
        reason:
          type: string
          nullable: true
          description: np. missing_config, fetch_unavailable, sendgrid_error, exception
        messageId:
          type: string
          nullable: true
          description: SendGrid x-message-id (gdy request został przyjęty)
      required:
        - attempted
        - sent
    ClientAuthResponse:
      type: object
      properties:
        token:
          type: string
        clientId:
          type: string
        salonId:
          type: string
        salons:
          type: array
          items:
            $ref: "#/components/schemas/ClientSalon"
    ClientSalon:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        clientId:
          type: string
        logoUrl:
          type: string
          nullable: true
        address:
          type: string
        phone:
          type: string
        hours:
          type: string
        description:
          type: string
    ClientMeResponse:
      type: object
      properties:
        client:
          type: object
          description: Profil klienta w aktywnym salonie
        salonPanelAvailable:
          type: boolean
          description: true gdy istnieje konto użytkownika panelu salonu (User) z tym
            samym e-mailem
      required:
        - client
        - salonPanelAvailable
    ClientAppointmentsResponse:
      type: object
      properties:
        appointments:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              date:
                type: string
              time:
                type: string
              duration:
                type: integer
              status:
                type: string
              source:
                type: string
                enum:
                  - PANEL
                  - ONLINE
              cancelToken:
                type: string
                nullable: true
              salonLogoUrl:
                type: string
                nullable: true
                description: Bezpośredni URL do logo salonu (ułatwienie dla mobile)
              salon:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  slug:
                    type: string
                  logoUrl:
                    type: string
                    nullable: true
                    description: URL do logo salonu (może być absolutny lub znormalizowany
                      względem PUBLIC_API_URL)
            required:
              - id
              - date
              - time
              - duration
              - status
              - salon
      required:
        - appointments
    ClientRegisterSessionStartResponse:
      type: object
      properties:
        sessionToken:
          type: string
        linkedSalonUser:
          type: boolean
          description: Ten sam e-mail ma już konto panelu salonu — można przełączyć się w
            ustawieniach /login
      required:
        - sessionToken
        - linkedSalonUser
    ClientRegisterVerifyResponse:
      allOf:
        - $ref: "#/components/schemas/ClientAuthResponse"
        - type: object
          properties:
            ok:
              type: boolean
            linkedSalonUser:
              type: boolean
          required:
            - ok
            - linkedSalonUser
    PublicBookingError:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_payload
            - salon_not_found
            - service_missing
            - service_not_found
            - staff_not_found
            - staff_service_mismatch
            - salon_closed
            - time_unavailable
            - break_time
            - staff_unavailable
            - staff_busy
        message:
          type: string
      required:
        - error
    Appointment:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
        time:
          type: string
        duration:
          type: integer
        status:
          type: string
        notes:
          type: string
          nullable: true
  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
paths:
  /api/health:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: OK
      tags:
        - System
  /api/auth/login:
    post:
      summary: Login (panel salonu)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_credentials:
                  value:
                    error: invalid_credentials
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                account_inactive:
                  value:
                    error: account_inactive
      tags:
        - Auth
  /api/auth/register:
    post:
      summary: Rejestracja salonu (OWNER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                phone:
                  type: string
                password:
                  type: string
                salonName:
                  type: string
                salonSlug:
                  type: string
              required:
                - email
                - phone
                - password
                - salonName
                - salonSlug
      responses:
        "200":
          description: OK (konto oczekuje aktywacji przez SUPER_ADMIN)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalonRegisterResponse"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "409":
          description: Email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                email_taken:
                  value:
                    error: email_taken
      tags:
        - Auth
  /api/auth/switch-salon:
    post:
      summary: Zmiana aktywnego salonu
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                salonId:
                  type: string
              required:
                - salonId
      responses:
        "200":
          description: OK
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                forbidden:
                  value:
                    error: forbidden
      tags:
        - Auth
  /api/auth/me:
    get:
      summary: Informacje o koncie zalogowanego użytkownika panelu
      description: Zwraca profil użytkownika panelu (SUPER_ADMIN/OWNER/STAFF) wraz z aktywnym salonem z tokena i rolą magazynową.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
      tags:
        - Auth
  /api/auth/salons:
    get:
      summary: Lista salonów dostępnych dla zalogowanego użytkownika panelu
      description: Dla OWNER/STAFF zwraca salony przypisane do konta; dla SUPER_ADMIN zwraca pełną listę salonów.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSalonsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
      tags:
        - Auth
  /api/auth/google-calendar/oauth/start:
    get:
      summary: Start OAuth Google Calendar (OWNER)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: URL autoryzacji Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  authUrl:
                    type: string
        "400":
          description: Brak aktywnego salonu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "403":
          description: Brak uprawnień (tylko OWNER)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
        "500":
          description: Brak konfiguracji OAuth po stronie serwera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
      tags:
        - Auth
  /api/auth/google-calendar/oauth/callback:
    get:
      summary: Callback OAuth Google Calendar
      description: Endpoint dla przekierowania z Google OAuth. Zapisuje tokeny integracji dla salonu z `state`.
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HTML z potwierdzeniem połączenia
          content:
            text/html:
              schema:
                type: string
        "400":
          description: Nieprawidłowy callback OAuth
      tags:
        - Auth
  /api/client/login:
    post:
      summary: Login klienta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
              examples:
                success:
                  value:
                    token: eyJhbGciOi...
                    clientId: c_123
                    salonId: s_123
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        logoUrl: https://purebook.pl/uploads/salon/logo-studio-bella.png
                        address: ul. Kwiatowa 1, Warszawa
                        phone: +48 123 456 789
                        hours: Pn-Pt 9:00-18:00
                        description: Salon fryzjerski
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: ul. Lipowa 5, Warszawa
                        phone: +48 222 333 444
                        hours: Pn-Sb 10:00-20:00
                        description: Salon kosmetyczny
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_credentials:
                  value:
                    error: invalid_credentials
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                account_inactive:
                  value:
                    error: account_inactive
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                internal_error:
                  value:
                    error: internal_error
      tags:
        - Client
  /api/client/salons:
    get:
      summary: Lista salonów klienta
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  salons:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientSalon"
                  activeSalonId:
                    type: string
              examples:
                success:
                  value:
                    activeSalonId: s_123
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        address: ul. Kwiatowa 1, Warszawa
                        phone: +48 123 456 789
                        hours: Pn-Pt 9:00-18:00
                        description: Salon fryzjerski
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: ul. Lipowa 5, Warszawa
                        phone: +48 222 333 444
                        hours: Pn-Sb 10:00-20:00
                        description: Salon kosmetyczny
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "404":
          description: Account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                account_not_found:
                  value:
                    error: account_not_found
      tags:
        - Client
  /api/client/social/login:
    post:
      summary: Logowanie klienta przez konto social (Google/Apple)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                provider:
                  type: string
                  enum:
                    - GOOGLE
                    - APPLE
              required:
                - userId
                - provider
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "404":
          description: Brak konta social
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                no_social_account_found:
                  value:
                    error: no_social_account_found
      tags:
        - Client
  /api/client/social/phone-verification/request:
    post:
      summary: Wyślij kod weryfikacji telefonu dla rejestracji social
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
              required:
                - phone
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "409":
          description: Telefon zajęty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                phone_taken:
                  value:
                    error: phone_taken
      tags:
        - Client
  /api/client/social/register:
    post:
      summary: Rejestracja konta klienta przez Google/Apple
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                provider:
                  type: string
                  enum:
                    - GOOGLE
                    - APPLE
                name:
                  type: string
                lastname:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                phoneVerificationCode:
                  type: string
              required:
                - userId
                - provider
                - name
                - lastname
                - email
                - phone
                - phoneVerificationCode
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientAuthResponse"
        "409":
          description: Konflikt email/social/telefon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                email_taken:
                  value:
                    error: email_taken
                social_account_taken:
                  value:
                    error: social_account_taken
      tags:
        - Client
  /api/client/switch-salon:
    post:
      summary: Zmiana aktywnego salonu klienta
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                salonId:
                  type: string
              required:
                - salonId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  clientId:
                    type: string
                  salonId:
                    type: string
              examples:
                success:
                  value:
                    token: eyJhbGciOi...
                    clientId: c_456
                    salonId: s_456
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "404":
          description: Salon not linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                salon_not_linked:
                  value:
                    error: salon_not_linked
      tags:
        - Client
  /api/client/salons/attach:
    post:
      summary: Dodanie salonu klienta po tokenie
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required:
                - token
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  salons:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientSalon"
              examples:
                success:
                  value:
                    ok: true
                    salons:
                      - id: s_123
                        name: Studio Bella
                        slug: studio-bella
                        clientId: c_123
                        address: ul. Kwiatowa 1, Warszawa
                        phone: +48 123 456 789
                        hours: Pn-Pt 9:00-18:00
                        description: Salon fryzjerski
                      - id: s_456
                        name: Beauty House
                        slug: beauty-house
                        clientId: c_456
                        address: ul. Lipowa 5, Warszawa
                        phone: +48 222 333 444
                        hours: Pn-Sb 10:00-20:00
                        description: Salon kosmetyczny
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                invalid_payload:
                  value:
                    error: invalid_payload
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthError"
              examples:
                unauthorized:
                  value:
                    error: unauthorized
        "404":
          description: Token invalid
          content:
            application/json:
