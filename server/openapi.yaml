      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  owner:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      phone:
                        type: string
                      active:
                        type: boolean
                      createdAt:
                        type: string
                  activationEmail:
                    allOf:
                      - $ref: "#/components/schemas/ActivationEmailStatus"
                    nullable: true
                  passwordEmail:
                    allOf:
                      - $ref: "#/components/schemas/ActivationEmailStatus"
                    nullable: true
      tags:
        - Admin
