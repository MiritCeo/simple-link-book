  /api/public/client/register/session:
    post:
      summary: Rejestracja klienta — krok 1 (e-mail i hasło)
      description: Tworzy sesję wieloetapowej rejestracji. Zwraca sessionToken na
        kolejne kroki (także dla aplikacji mobilnej).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                confirmPassword:
                  type: string
                  minLength: 8
              required:
                - email
                - password
                - confirmPassword
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRegisterSessionStartResponse"
        "400":
          description: Invalid payload / hasła niezgodne
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_payload
                      - password_mismatch
        "409":
          description: Konto klienta z tym e-mailem już istnieje
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - email_taken
      tags:
        - Auth
  /api/public/client/register/session/phone:
    post:
      summary: Rejestracja klienta — krok 2 (telefon + wysłanie kodu)
      description: Zapisuje numer i wysyła jeden wspólny kod SMS + e-mail (testy).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionToken:
                  type: string
                phone:
                  type: string
                  description: Format +48 123 456 789
              required:
                - sessionToken
                - phone
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid payload / telefon
        "404":
          description: Sesja nie istnieje
        "410":
          description: Sesja wygasła
      tags:
        - Auth
  /api/public/client/register/session/resend-code:
    post:
      summary: Ponowne wysłanie kodu weryfikacyjnego (SMS + e-mail)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionToken:
                  type: string
              required:
                - sessionToken
      responses:
        "200":
          description: OK
        "400":
          description: Brak numeru w sesji
        "404":
          description: Sesja nie istnieje
        "410":
          description: Sesja wygasła
      tags:
        - Auth
  /api/public/client/register/session/verify:
    post:
      summary: Rejestracja klienta — krok 3 (kod z SMS/e-mail)
      description: Po poprawnym kodzie zakłada konto, scala wizyty po numerze telefonu
        i salony. Zwraca JWT jak /api/client/login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionToken:
                  type: string
                code:
                  type: string
                  minLength: 4
                  maxLength: 8
              required:
                - sessionToken
                - code
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientRegisterVerifyResponse"
        "400":
          description: Nieprawidłowy kod / wygasł / za dużo prób
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - invalid_payload
                      - invalid_code
                      - code_expired
                      - phone_not_set
                      - too_many_attempts
        "404":
          description: Sesja nie istnieje
        "409":
          description: E-mail zajęty lub numer powiązany z innym kontem
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - email_taken
                      - phone_linked_other_account
        "410":
          description: Sesja wygasła
        "503":
          description: Brak salonu w systemie (skonfiguruj DEFAULT_REGISTRATION_SALON_ID)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    enum:
                      - no_salon
      tags:
        - Auth
